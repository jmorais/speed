services:
  speed-lan-check:
    build: .
    container_name: speed-lan-check
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DOWNLOAD_CHUNK_SIZE: 65536
      DOWNLOAD_CHUNKS: 4000
      UPLOAD_PAYLOAD_BYTES: 104857600
      UPLOAD_PASSES: 1
      UPLOAD_LIMIT_MB: 512
    restart: unless-stopped